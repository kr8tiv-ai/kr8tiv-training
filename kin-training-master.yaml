# KIN Training Master Config — All 6 Companions on Gemma 4 31B
# Timeline: 5 days | Budget: $100 (Pro+ $50 + $50 PAYG = 1100 compute units)
# GPU: A100 40GB via Colab Pro+

# ============================================================================
# Global Settings
# ============================================================================
global:
  base_model: "unsloth/gemma-4-31B-it-bnb-4bit"
  fallback_model: "unsloth/gemma-4-E4B-it-bnb-4bit"  # If A100 unavailable
  model_family: gemma
  platform: colab_pro_plus
  gpu: A100-40GB
  quantization_export: [q4_k_m, q5_k_m]
  hf_org: kr8tiv
  total_budget_units: 1100    # Pro+ 600 + PAYG 500

  # LoRA (shared across all companions)
  lora:
    rank: 64                  # Higher rank for 31B (more capacity)
    alpha: 128                # 2x ratio
    target_modules: all-linear
    dropout: 0.0
    use_gradient_checkpointing: unsloth

  # Training defaults
  defaults:
    sft_lr: 2.0e-4
    sft_epochs: 2
    sft_batch: 1              # A100 with 31B = batch 1 + grad accum
    sft_grad_accum: 16
    simpo_lr: 5.0e-7
    simpo_beta: 2.5
    simpo_gamma: 1.0
    grpo_lr: 8.0e-6
    grpo_group_size: 2
    grpo_batch: 4
    max_seq_length: 8192      # 31B supports longer context on A100

# ============================================================================
