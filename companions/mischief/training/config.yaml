# Mischief Training Configuration
# 4-stage pipeline: SFT → SimPO → GRPO → KTO
# All stages use Unsloth QLoRA on Gemma 4 E4B
# Domain: Personal Branding + Family Coordination

# ============================================================================
# Base Model
# ============================================================================
base_model:
  name: "unsloth/gemma-4-E4B-it-bnb-4bit"
  family: gemma
  parameters: 4500000000  # ~4.5B effective
  context_window: 4096    # 6GB VRAM safe
  quantization: Q4_K_M    # Best quality-to-size at 4-bit

# ============================================================================
# LoRA Configuration (Shared across stages)
# ============================================================================
lora:
  rank: 32
  alpha: 64                # 2x ratio — optimal for conversational generation
  target_modules: all-linear  # q/k/v/o_proj + gate/up/down_proj
  dropout: 0.0             # Zero dropout with abundant data
  bias: none
  use_rslora: false        # Standard LoRA at r=32 is sufficient
  use_gradient_checkpointing: unsloth  # Unsloth optimized

# ============================================================================
# Stage 1: Supervised Fine-Tuning (SFT)
# ============================================================================
sft:
  data:
    paths:
      - training/stage1-sft/data/persona-conversations.jsonl      # Mischief voice, full puppy energy
      - training/stage1-sft/data/brand-voice-sessions.jsonl       # Voice profiling dialogues
      - training/stage1-sft/data/family-coordination.jsonl        # Scheduling, reminders, briefings
      - training/stage1-sft/data/social-content-drafts.jsonl      # Platform-native content creation
      - training/stage1-sft/data/encouragement-messages.jsonl     # Personalized daily boosts
      - training/stage1-sft/data/tool-calling-examples.jsonl      # MCP tool use patterns
    format: chatml            # ChatML format for Gemma 4
    max_seq_length: 4096
    mask_user_turns: true     # Loss on response tokens only
  training:
    learning_rate: 2.0e-4
    batch_size: 2
    gradient_accumulation_steps: 8  # Effective batch: 16
    epochs: 3                       # Extra epoch for voice pattern embedding
    warmup_ratio: 0.03
    lr_scheduler: cosine
    weight_decay: 0.01
    max_grad_norm: 1.0
    seed: 42
  output:
    dir: training/output/mischief/sft
    merge_lora: true          # Merge LoRA into base for next stage

# ============================================================================
# Stage 2: Simple Preference Optimization (SimPO)
# ============================================================================
simpo:
  data:
    path: training/stage2-simpo/data/preference-pairs.jsonl
    # Pairs contrast: Mischief-voiced (chosen) vs generic/flat (rejected)
    # Also contrast: on-brand content (chosen) vs off-brand/performed (rejected)
    format: preference        # {chosen, rejected} pairs
    max_seq_length: 4096
  training:
    beta: 2.0                 # Large beta discourages verbose non-puppy output
    gamma: 1.0                # Target reward margin
    learning_rate: 5.0e-7
    batch_size: 2
    gradient_accumulation_steps: 4
    epochs: 1
    warmup_ratio: 0.1
    loss_type: simpo          # Via TRL CPOTrainer
  reference_model: none       # SimPO is reference-free
  output:
    dir: training/output/mischief/simpo
    merge_lora: true

# ============================================================================
# Stage 3: Group Relative Policy Optimization (GRPO)
# ============================================================================
grpo:
  data:
    path: training/stage3-grpo/data/grpo-problems.jsonl
    # Prompts: brand voice challenges, family scheduling scenarios, content briefs
    format: prompt            # Single prompts for rollout generation
    max_prompt_length: 2048
    max_completion_length: 4096
  training:
    group_size: 2             # 2-GRPO variant (70% faster)
    batch_size: 256           # Prompts per batch
    clip_epsilon_low: 0.2     # DAPO lower clip
    clip_epsilon_high: 0.28   # DAPO upper clip
    learning_rate: 8.0e-6
    kl_coefficient: 0.001
    epochs: 1
  rewards:
    # Composite reward function weights — domain-specific
    voice_authenticity: 0.35  # Does output sound like a specific human, not generic content?
    personality_adherence: 0.30  # Mischief persona match (puppy energy, dog metaphors, emojis)
    task_completion: 0.20     # Did the scheduling/content/encouragement task actually get done?
    specificity: 0.10         # Concrete > vague (specific encouragement, specific brand feedback)
    format_bonus: 0.05        # Valid JSON tool calls, correct platform formatting
  evaluation:
    voice_match_model: "kr8tiv/brand-voice-judge"   # Classifier for authenticity scoring
    persona_classifier: "kr8tiv/kin-persona-judge"  # Personality adherence scoring
    timeout_seconds: 10
  output:
    dir: training/output/mischief/grpo
    merge_lora: true

# ============================================================================
# Stage 4: Kahneman-Tversky Optimization (KTO)
# ============================================================================
kto:
  data:
    path: training/stage4-kto/data/user-feedback.jsonl
    format: binary            # {input, output, label: "desirable"|"undesirable"}
    # Desirable: content accepted/posted, encouragement marked helpful, schedule saved
    # Undesirable: content heavily edited, brand check failed, tone felt wrong
  training:
    beta: 0.1
    learning_rate: 5.0e-7
    batch_size: 2
    gradient_accumulation_steps: 4
    epochs: 1
    lambda_ratio: 1.0         # lambda_D * n_D / (lambda_U * n_U)
  output:
    dir: training/output/mischief/kto
    merge_lora: true

# ============================================================================
# GGUF Export
# ============================================================================
export:
  formats:
    - Q4_K_M                  # ~5GB — balanced quality/size
    - Q4_K_S                  # ~4.8GB — low VRAM
    - Q5_K_M                  # ~5.5GB — higher quality
  output_dir: training/output/mischief/gguf
  hf_repo: kr8tiv/kin-mischief-GGUF
  ollama_model: kin-mischief

# ============================================================================
# Training Data Guidelines
# ============================================================================
data_guidelines:
  persona_conversations:
    # Every Mischief response MUST include:
    # - At least one dog metaphor per 3 responses
    # - Emoji usage matching the high-density profile
    # - Short punchy sentence(s) when expressing enthusiasm
    # - Specific encouragement (not generic "you've got this")
    # - A question or next step that moves the user forward
    min_mischief_energy_score: 0.85  # Via persona classifier

  brand_voice_sessions:
    # Training sessions should demonstrate:
    # - Voice profiling through questions (not statements)
    # - Contrast between "sounds like you" vs "sounds generic"
    # - Iteration toward authenticity, not perfection
    # - Celebrating specific phrases the user already uses
    requires_voice_differentiation: true

  social_content_drafts:
    # Content examples must:
    # - Be written in a distinct human voice (not "brand voice template")
    # - Vary by platform (Instagram caption != LinkedIn post != TikTok hook)
    # - Include Mischief narration before/after the draft
    # - Show the brand-check step (mental review for authenticity)
    platforms_covered:
      - instagram
      - linkedin
      - twitter
      - tiktok
      - threads

  family_coordination:
    # Scenarios should cover:
    # - Multi-member household scheduling
    # - Milestone reminders with warmth (not robotic alerts)
    # - Morning briefing format (schedule → priorities → encouragement)
    # - Pack member awareness (uses names, knows relationships)
    requires_named_family_members: true

  encouragement_messages:
    # HARD RULE: No generic encouragement
    # Every message must reference something SPECIFIC happening in the user's life
    # Bad: "You've got this!"
    # Good: "You're presenting to that big client today — you've been prepping for two weeks.
    #         The work is done. Walk in like the pack depends on it 🐾"
    generic_messages_allowed: false

# ============================================================================
# Evaluation
# ============================================================================
evaluation:
  benchmarks:
    - persona-adherence          # Big Five personality match — very high extraversion
    - voice-authenticity         # Brand voice differentiation score
    - family-coordination        # Scheduling accuracy, reminder completeness
    - tool-calling               # BFCL structured output validity
    - encouragement-specificity  # Ratio of specific vs generic encouragement
    - platform-calibration       # Content correctly adapted per platform
  targets:
    persona_adherence: 0.90          # Mischief personality stable
    voice_authenticity_score: 0.85   # Content sounds like specific human, not template
    tool_call_validity: 0.85         # MCP calls correctly formed
    encouragement_specificity: 0.80  # 80%+ of boosts reference real user context
    family_recall_accuracy: 0.95     # Pack member details correctly applied
    platform_format_accuracy: 0.90   # Right format, right length, right tone per platform
