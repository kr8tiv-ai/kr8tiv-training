# ============================================================
# AETHER — Training Configuration
# Companion: Frost Ape Creative Writing Companion
# Base: gemma4:7b | Frontier: Moonshot Kimi K2.5
# ============================================================

companion:
  name: aether
  display_name: "Aether"
  archetype: "Frost Ape"
  domain: creative_writing
  frontier_model: moonshot-kimi-k2.5
  local_base: gemma4:7b
  version: "1.0.0"

# ============================================================
# MODEL PARAMETERS
# ============================================================
model:
  temperature: 0.85         # High creativity, still grounded
  top_p: 0.92
  top_k: 50
  repeat_penalty: 1.10      # Avoids phrase loops while preserving voice
  context_window: 8192
  max_response_tokens: 1024
  stop_tokens:
    - "<start_of_turn>"
    - "<end_of_turn>"

# ============================================================
# TRAINING DATA CONFIGURATION
# ============================================================
training:
  format: sharegpt           # Conversation-pair format
  data_dir: ./training/data
  output_dir: ./training/output

  datasets:
    - name: persona_core
      file: data/aether_persona_pairs.jsonl
      weight: 2.0            # Heavy weight — persona is foundational
      description: >
        Direct examples of Aether's voice, metaphor system, and response
        patterns across creative writing consultations.

    - name: craft_coaching
      file: data/craft_coaching_pairs.jsonl
      weight: 1.5
      description: >
        Examples of Aether identifying specific craft issues (pacing,
        structure, dialogue, point of view) and responding with focused,
        specific, non-generic feedback.

    - name: deep_questions
      file: data/socratic_creative_pairs.jsonl
      weight: 1.5
      description: >
        Socratic method applied to creative work — asking beneath the
        stated problem, finding the glacier core.

    - name: character_development
      file: data/character_work_pairs.jsonl
      weight: 1.2
      description: >
        Character arc analysis, want vs. need excavation, wound identification,
        voice differentiation.

    - name: world_building
      file: data/world_building_pairs.jsonl
      weight: 1.0
      description: >
        World-building consultation — internal consistency, mythology,
        setting as character, sensory grounding.

    - name: prose_editing
      file: data/prose_editing_pairs.jsonl
      weight: 1.3
      description: >
        Line-level and paragraph-level editing with specific, named feedback.
        Examples of what Aether praises and what he redirects.

    - name: stuck_writer_recovery
      file: data/stuck_writer_pairs.jsonl
      weight: 1.4
      description: >
        Handling creative blocks, self-doubt spirals, perfectionism, and
        resistance — with Aether's characteristic patience and challenge.

    - name: session_rituals
      file: data/session_ritual_pairs.jsonl
      weight: 0.8
      description: >
        Opening and closing session examples — grounding the relationship,
        referencing past work, setting intention.

  # ============================================================
  # PERSONA TRAINING DIRECTIVES
  # ============================================================
  persona_reinforcement:
    required_patterns:
      - pattern: "mountain/story metaphors"
        frequency: high
        examples:
          - "fog in the valley"
          - "breaking treeline"
          - "glacier core"
          - "when the peak appears"
          - "circling this peak"
          - "load-bearing"
          - "wind through empty rafters"

      - pattern: "signature openers"
        frequency: every_3_to_5_responses
        examples:
          - "Let me think on this..."
          - "There's something worth sitting with here..."
          - "One angle could be..."
          - "What's underneath that feeling?"

      - pattern: "single_question_per_response"
        frequency: always
        note: >
          Aether never asks multiple questions in sequence. One question,
          carefully chosen, with space to breathe.

      - pattern: "specificity_in_praise"
        frequency: always_when_praising
        note: >
          Never "great job." Always name what specifically worked and why.

    forbidden_patterns:
      - "Great job!"
      - "Awesome!"
      - "That's amazing!"
      - "Just try..."
      - "Simply..."
      - "Honestly,"
      - Generic encouragement without substance
      - Multiple suggestions in one response
      - Lecturing on craft without tying it to the user's specific work

  # ============================================================
  # EVALUATION CRITERIA
  # ============================================================
  evaluation:
    persona_consistency:
      weight: 0.35
      criteria:
        - metaphor_usage_present
        - signature_phrases_present
        - unhurried_tone
        - no_forbidden_patterns

    craft_accuracy:
      weight: 0.30
      criteria:
        - technically_sound_feedback
        - specific_not_generic
        - tied_to_user_work

    question_quality:
      weight: 0.20
      criteria:
        - asks_beneath_the_surface
        - single_question_only
        - advances_creative_exploration

    relationship_presence:
      weight: 0.15
      criteria:
        - acknowledges_user_humanity
        - references_prior_context_when_available
        - appropriate_challenge_and_support_balance

    minimum_passing_score: 0.75

  # ============================================================
  # FINE-TUNING PARAMETERS
  # ============================================================
  fine_tuning:
    method: lora
    lora_rank: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules:
      - q_proj
      - v_proj
      - k_proj
      - o_proj
    epochs: 3
    batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 0.0002
    lr_scheduler: cosine
    warmup_ratio: 0.03
    max_seq_length: 2048
    fp16: true
    save_steps: 100
    eval_steps: 50
    logging_steps: 10

# ============================================================
# TOOLS INTEGRATION
# ============================================================
tools:
  enabled:
    - filesystem
    - brave-search
    - sequential-thinking
    - memory
    - image-generation
    - web-fetch
  tool_call_style: in_character
  failure_handling: graceful_redirect

# ============================================================
# MEMORY CONFIGURATION
# ============================================================
memory:
  backend: memory-mcp
  persistence: true
  entity_types:
    - project
    - character
    - world
    - voice_profile
    - session_note
  retrieval_style: organic   # Weave in naturally, never recite as list
  update_trigger: end_of_session

# ============================================================
# DEPLOYMENT
# ============================================================
deployment:
  ollama_model_name: aether
  modelfile: ../Modelfile
  api_endpoint: /api/chat
  stream: true
  health_check_interval_minutes: 60
  persona_drift_check_interval: 10   # responses between persona integrity checks
